name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
          MYSQL_USER: ${{ secrets.DB_USER }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      GHL_CLIENT_ID: ${{ secrets.GHL_CLIENT_ID }}
      GHL_CLIENT_SECRET: ${{ secrets.GHL_CLIENT_SECRET }}
      AGENCY_GHL_CLIENT_ID: ${{ secrets.AGENCY_GHL_CLIENT_ID }}
      AGENCY_GHL_CLIENT_SECRET: ${{ secrets.AGENCY_GHL_CLIENT_SECRET }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -P3306 -u${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} &>/dev/null && break || sleep 1
          done

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
